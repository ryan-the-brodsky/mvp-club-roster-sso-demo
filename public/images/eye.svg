<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="The Eye of the Panopticon">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eba714"/>
      <stop offset="55%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#8a4a04"/>
    </radialGradient>
    <radialGradient id="scleraGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#faf5f0"/>
      <stop offset="85%" stop-color="#e9dfd2"/>
      <stop offset="100%" stop-color="#c9b79d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="eyeShape">
      <path d="M 20 100 Q 200 0 380 100 Q 200 200 20 100 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="400" height="200" fill="#081f3f"/>

  <ellipse cx="200" cy="100" rx="190" ry="90" fill="url(#glow)"/>

  <g clip-path="url(#eyeShape)">
    <rect x="0" y="0" width="400" height="200" fill="url(#scleraGrad)"/>
    <circle cx="200" cy="100" r="78" fill="url(#iris)"/>
    <g stroke="#8a4a04" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
      <line x1="200" y1="22" x2="200" y2="178"/>
      <line x1="122" y1="100" x2="278" y2="100"/>
      <line x1="145" y1="45" x2="255" y2="155"/>
      <line x1="255" y1="45" x2="145" y2="155"/>
      <line x1="130" y1="70" x2="270" y2="130"/>
      <line x1="270" y1="70" x2="130" y2="130"/>
      <line x1="165" y1="28" x2="235" y2="172"/>
      <line x1="235" y1="28" x2="165" y2="172"/>
    </g>
    <circle cx="200" cy="100" r="26" fill="#081f3f"/>
    <ellipse cx="193" cy="90" rx="7" ry="4" fill="#faf5f0" opacity="0.75"/>
  </g>

  <path d="M 20 100 Q 200 0 380 100 Q 200 200 20 100 Z"
        fill="none" stroke="#081f3f" stroke-width="3"/>
</svg>
